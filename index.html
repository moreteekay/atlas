<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Atlas | MoreTeekay</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="menu-button" aria-label="Open Atlas menu">☰</button>
  <aside id="sidebar">
    <div class="sidebar-header">
      <div>
        <h1>Atlas</h1>
        <p>An autobiography through places.</p>
      </div>
      <button id="close-sidebar" aria-label="Close menu">×</button>
    </div>
    <label for="search">Find a place</label>
    <input id="search" type="search" placeholder="City, river, beach, monument…">
    <button id="show-all">Show the whole map</button>
    <div id="navigation"></div>
  </aside>
  <main id="map"></main>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
